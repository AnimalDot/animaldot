workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData
    scripts:
      - name: Build iOS app for physical device
        script: |
          xcodebuild build \
            -project mobile-ios/AnimalDot.xcodeproj \
            -scheme AnimalDot \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath $PWD/mobile-ios/build_data \
            -resolvePackageDependencies
      - name: Package into unsigned IPA
        script: |
          # 1. Dynamically find the .app file wherever Xcode put it
          APP_PATH=$(find $PWD/mobile-ios/build_data/Build/Products -name "*.app" | head -n 1)
          
          # 2. Create clean output directories
          mkdir -p $PWD/mobile-ios/outputs/Payload
          
          # 3. Copy the found .app file into the Payload folder
          cp -R "$APP_PATH" $PWD/mobile-ios/outputs/Payload/
          
          # 4. Navigate into the outputs folder and zip it into an .ipa
          cd $PWD/mobile-ios/outputs
          zip -r AnimalDot_Unsigned.ipa Payload/
    artifacts:
      - mobile-ios/outputs/*.ipa
    publishing:
      email:
        recipients:
          - j.edusei@icloud.com
        notify:
          success: true
          failure: true
