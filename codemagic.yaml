workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData
    scripts:
      - name: Build iOS app for physical device
        script: |
          xcodebuild build \
            -project mobile-ios/AnimalDot.xcodeproj \
            -scheme AnimalDot \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR=$PWD/mobile-ios/build/outputs \
            -resolvePackageDependencies
      - name: Package into unsigned IPA
        script: |
          cd mobile-ios/build/outputs
          mkdir -p Payload
          # Move the compiled .app into the Payload folder
          mv *.app Payload/
          # Zip it into an .ipa file format
          zip -r AnimalDot_Unsigned.ipa Payload/
    artifacts:
      - mobile-ios/build/outputs/*.ipa
    publishing:
      email:
        recipients:
          - j.edusei@icloud.com
        notify:
          success: true
          failure: true
