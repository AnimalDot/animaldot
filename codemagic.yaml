workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: 15.4
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcodebuild -project mobile-ios/AnimalDot.xcodeproj \
            -scheme AnimalDot \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -destination 'generic/platform=iOS Simulator' \
            -resolvePackageDependencies
      - name: Build iOS app
        script: |
          xcodebuild build \
            -project mobile-ios/AnimalDot.xcodeproj \
            -scheme AnimalDot \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - mobile-ios/build/outputs/**
    publishing:
      email:
        recipients:
          - jedus@animaldot.com
        notify:
          success: false
          failure: true
