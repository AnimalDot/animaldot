; ============================================================================
; PlatformIO Project Configuration — AnimalDot Smart Bed
;
; Build targets:
;   [env:esp32dev]   — Standard ESP32-DevKitC (primary)
;   [env:m5stick]    — M5StickC Plus 2 (optional display board)
;
; Quick start:
;   pio run                       # Build default (esp32dev)
;   pio run -t upload -t monitor  # Flash + serial monitor
; ============================================================================

[platformio]
default_envs = esp32dev

; ---------- Shared settings ----------
[common]
platform      = espressif32
framework     = arduino
monitor_speed = 115200
lib_deps =
    ; --- Sensors ---
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    ; --- BLE ---
    h2zero/NimBLE-Arduino@^1.4.1
    ; --- MQTT ---
    knolleary/PubSubClient@^2.8
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED
    -DBOARD_HAS_PSRAM=0

; ---------- ESP32-DevKitC ----------
[env:esp32dev]
platform      = ${common.platform}
board         = esp32dev
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps      = ${common.lib_deps}
build_flags   = ${common.build_flags}

; ---------- M5StickC Plus 2 (optional) ----------
[env:m5stick]
platform      = ${common.platform}
board         = m5stick-c
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps      =
    ${common.lib_deps}
    m5stack/M5Unified@^0.1.6
build_flags   =
    ${common.build_flags}
    -DM5_BOARD=1
